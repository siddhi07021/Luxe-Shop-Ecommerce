<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | LUXE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Syne:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 90% 10%, #fff5f5 0%, #cea4a4 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 4rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .brand {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            letter-spacing: -2px;
            margin-bottom: 2rem;
            text-align: center;
        }
        .brand span { color: #ac4545; }
        .form-control {
            border-radius: 50px;
            padding: 12px 25px;
            border: 1px solid #eee;
            margin-bottom: 1.5rem;
        }
        .btn-dark {
            border-radius: 50px;
            padding: 12px;
            font-weight: 600;
            background: #111;
            width: 100%;
            transition: 0.3s;
        }
        .btn-dark:hover {
            transform: translateY(-3px);
            background: #ac4545;
            border-color: #ac4545;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">LUXE<span>.</span>Admin</div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert {% if category == 'info' %}alert-dark{% else %}alert-danger{% endif %} border-0 small py-2 rounded-pill text-center mb-4">
              {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label class="small fw-bold mb-2 ms-3 text-muted">USERNAME</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required>
            </div>
            <div class="mb-4">
                <label class="small fw-bold mb-2 ms-3 text-muted">PASSWORD</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-dark">Access Console</button>
            <hr class="my-4 opacity-10">
<div class="text-center">
    <a href="/" class="text-muted small text-decoration-none fw-semibold" style="letter-spacing: 1px;">
        <i class="bi bi-arrow-left me-1"></i> BACK TO FRONTEND
    </a>
</div>
        </form>
    </div>
</body>
</html>
